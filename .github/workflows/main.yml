name: Build, Test, and Publish Latest Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: carbonpets-latest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew clean build --warning-mode all

      - name: Publish rolling latest release
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: cybellereaper/mobstacker
          TAG: latest
          TITLE: Latest build
        run: |
          set -euo pipefail
          shopt -s nullglob

          jars=(build/libs/*.jar)

          if [ ${#jars[@]} -eq 0 ]; then
            echo "No JAR files found in build/libs"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG" --force

          notes_file="$(mktemp)"
          {
            echo "Automatic latest build"
            echo
            echo "- Branch: \`$GITHUB_REF_NAME\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > "$notes_file"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            mapfile -t existing_assets < <(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')

            for asset in "${existing_assets[@]}"; do
              gh release delete-asset "$TAG" "$asset" --repo "$REPO" --yes
            done

            gh release edit "$TAG" \
              --repo "$REPO" \
              --title "$TITLE" \
              --notes-file "$notes_file" \
              --latest
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TITLE" \
              --notes-file "$notes_file" \
              --latest
          fi

          gh release upload "$TAG" "${jars[@]}" \
            --repo "$REPO"
